<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick Up! — Sali a Bordo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sky:       #e8f4fd;
    --sky-mid:   #bde0f7;
    --sky-deep:  #5bb8f5;
    --ocean:     #1a7fbf;
    --ocean-dark:#135d8c;
    --coral:     #ff6b4a;
    --coral-dim: #e55030;
    --mango:     #ffb830;
    --mango-dim: #e09f20;
    --mint:      #3dcb8e;
    --mint-dim:  #2aad74;
    --sand:      #fff8ed;
    --white:     #ffffff;
    --ink:       #1a2332;
    --ink-mid:   #2d3e55;
    --ink-soft:  #4a6278;
    --ink-faint: #8aa0b2;
    --border:    #d4e6f0;
    --border-mid:#b8d5e8;
    --card-bg:   #ffffff;
    --page-bg:   #f0f8ff;
    --shadow-sm: 0 2px 8px rgba(26,127,191,0.08);
    --shadow-md: 0 4px 24px rgba(26,127,191,0.13);
    --shadow-lg: 0 12px 48px rgba(26,127,191,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--page-bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--sky); }
  ::-webkit-scrollbar-thumb { background: var(--sky-deep); border-radius: 3px; }

  /* WAVE DECORATION */
  .wave-divider {
    width: 100%;
    overflow: hidden;
    line-height: 0;
    margin-bottom: -2px;
  }
  .wave-divider svg { display: block; width: 100%; }

  /* TYPOGRAPHY */
  .righteous { font-family: 'Righteous', cursive; }
  .mono { font-family: 'DM Mono', monospace; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 68px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1.5px solid var(--border);
    box-shadow: 0 2px 16px rgba(26,127,191,0.07);
  }

  .nav-logo {
    font-family: 'Righteous', cursive;
    font-size: 26px;
    color: var(--ocean);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
  }

  .nav-logo .excl { color: var(--coral); }
  .nav-logo .dot { 
    width: 10px; height: 10px; background: var(--mango);
    border-radius: 50%; display: inline-block;
    animation: bounceDot 1.8s ease-in-out infinite;
  }
  @keyframes bounceDot {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-link {
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .nav-link:hover { background: var(--sky); color: var(--ocean); }
  .nav-link.active { background: var(--sky); color: var(--ocean); }

  .nav-actions { display: flex; gap: 10px; align-items: center; }

  /* BUTTONS */
  .btn {
    padding: 10px 22px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--coral), #ff8060);
    color: white;
    box-shadow: 0 4px 16px rgba(255,107,74,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,74,0.45); }

  .btn-ocean {
    background: linear-gradient(135deg, var(--ocean), var(--sky-deep));
    color: white;
    box-shadow: 0 4px 16px rgba(26,127,191,0.3);
  }
  .btn-ocean:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,127,191,0.4); }

  .btn-mango {
    background: linear-gradient(135deg, var(--mango), #ffc850);
    color: var(--ink);
    box-shadow: 0 4px 16px rgba(255,184,48,0.3);
  }
  .btn-mango:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,184,48,0.45); }

  .btn-outline {
    background: white;
    color: var(--ocean);
    border: 2px solid var(--sky-deep);
  }
  .btn-outline:hover { background: var(--sky); border-color: var(--ocean); }

  .btn-ghost {
    background: var(--sky);
    color: var(--ocean);
  }
  .btn-ghost:hover { background: var(--sky-mid); }

  .btn-white {
    background: white;
    color: var(--coral);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .btn-white:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

  .btn-sm { padding: 7px 16px; font-size: 13px; }
  .btn-lg { padding: 14px 32px; font-size: 16px; }
  .btn-full { width: 100%; justify-content: center; }

  /* HERO */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(160deg, #1a7fbf 0%, #2196d3 35%, #5bb8f5 65%, #8fd4f8 100%);
    padding-top: 68px;
  }

  /* Floating clouds */
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.25);
    border-radius: 50px;
    filter: blur(1px);
  }
  .cloud::before, .cloud::after {
    content:'';
    position:absolute;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
  }
  .c1 { width:120px;height:40px;top:15%;left:8%;animation:cloudFloat 18s linear infinite; }
  .c1::before{width:50px;height:50px;top:-20px;left:20px;}
  .c1::after{width:35px;height:35px;top:-15px;left:55px;}
  .c2 { width:80px;height:28px;top:25%;right:12%;animation:cloudFloat 22s linear infinite reverse; opacity:0.7; }
  .c2::before{width:36px;height:36px;top:-16px;left:12px;}
  .c2::after{width:24px;height:24px;top:-10px;left:40px;}
  .c3 { width:160px;height:48px;top:60%;left:5%;animation:cloudFloat 26s linear infinite; opacity:0.5; }
  .c3::before{width:64px;height:64px;top:-26px;left:28px;}
  .c3::after{width:48px;height:48px;top:-20px;left:78px;}

  @keyframes cloudFloat {
    0%   { transform: translateX(-40px); }
    50%  { transform: translateX(40px); }
    100% { transform: translateX(-40px); }
  }

  /* Road at bottom of hero */
  .hero-road-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 180px;
  }

  .truck-wrap {
    position: absolute;
    bottom: 60px;
    animation: truckDrive 18s linear infinite;
    font-size: 56px;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
    z-index: 2;
  }
  @keyframes truckDrive {
    from { left: -90px; }
    to { left: 110%; }
  }

  /* Sun decoration */
  .sun {
    position: absolute;
    top: 60px;
    right: 80px;
    width: 80px;
    height: 80px;
    background: var(--mango);
    border-radius: 50%;
    box-shadow: 0 0 0 16px rgba(255,184,48,0.2), 0 0 0 32px rgba(255,184,48,0.1);
    animation: sunPulse 4s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%,100% { box-shadow: 0 0 0 16px rgba(255,184,48,0.2), 0 0 0 32px rgba(255,184,48,0.1); }
    50% { box-shadow: 0 0 0 24px rgba(255,184,48,0.25), 0 0 0 48px rgba(255,184,48,0.08); }
  }

  .hero-content {
    position: relative;
    z-index: 3;
    text-align: center;
    max-width: 800px;
    padding: 0 24px 80px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    color: white;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }

  .hero-title {
    font-family: 'Righteous', cursive;
    font-size: clamp(56px, 11vw, 130px);
    color: white;
    line-height: 0.95;
    text-shadow: 0 4px 20px rgba(0,0,0,0.15);
    margin-bottom: 8px;
  }

  .hero-title .pickup-excl { color: var(--mango); }

  .hero-sub-title {
    font-family: 'Righteous', cursive;
    font-size: clamp(20px, 4vw, 42px);
    color: rgba(255,255,255,0.85);
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  .hero-desc {
    font-size: 17px;
    color: rgba(255,255,255,0.88);
    max-width: 500px;
    margin: 0 auto 40px;
    line-height: 1.75;
    font-weight: 500;
  }

  .hero-ctas {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }

  .hero-stats {
    display: flex;
    gap: 40px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    padding: 16px 28px;
  }

  .hero-stat-num {
    font-family: 'Righteous', cursive;
    font-size: 36px;
    color: white;
    line-height: 1;
  }

  .hero-stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  /* SECTION */
  .section {
    padding: 80px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--sky);
    color: var(--ocean);
    border-radius: 50px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .section-title {
    font-family: 'Righteous', cursive;
    font-size: clamp(32px, 4vw, 56px);
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 48px;
  }

  .section-title .accent { color: var(--coral); }

  /* CARDS */
  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s;
    box-shadow: var(--shadow-sm);
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }

  .card-body { padding: 24px; }

  /* TRIP CARD */
  .trip-card { cursor: pointer; }

  .trip-top {
    background: linear-gradient(135deg, var(--sky) 0%, #ddf0ff 100%);
    padding: 20px 24px 16px;
    position: relative;
    overflow: hidden;
  }

  .trip-top::after {
    content: '🚛';
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    opacity: 0.18;
  }

  .route-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .city {
    font-family: 'Righteous', cursive;
    font-size: 22px;
    color: var(--ink);
  }

  .route-line {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .route-dot {
    width: 8px; height: 8px;
    background: var(--coral);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .route-dash {
    flex: 1;
    height: 2px;
    background: repeating-linear-gradient(to right, var(--sky-deep) 0px, var(--sky-deep) 6px, transparent 6px, transparent 12px);
  }

  .route-arrow-icon {
    font-size: 16px;
    flex-shrink: 0;
  }

  .trip-price-tag {
    position: absolute;
    top: 0; right: 60px;
    background: var(--coral);
    color: white;
    font-family: 'Righteous', cursive;
    font-size: 22px;
    padding: 6px 16px 8px;
    border-radius: 0 0 14px 14px;
    box-shadow: 0 4px 12px rgba(255,107,74,0.35);
  }

  .trip-price-small { font-size: 11px; font-family:'Nunito',sans-serif; font-weight:700; opacity:0.85; }

  .trip-body { padding: 16px 24px 20px; }

  .trip-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 14px;
  }

  .meta-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--sky);
    color: var(--ink-soft);
    padding: 5px 12px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
  }

  .driver-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--sand);
    border-radius: 12px;
    border: 1px solid #ffe8cc;
  }

  .seats-bar { height: 5px; background: var(--sky-mid); border-radius: 3px; margin-top: 14px; overflow: hidden; }
  .seats-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 20px; }

  /* FORMS */
  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 7px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 11px 16px;
    background: var(--sky);
    border: 1.5px solid var(--border-mid);
    border-radius: 12px;
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--sky-deep);
    background: white;
    box-shadow: 0 0 0 3px rgba(91,184,245,0.18);
  }

  .form-input::placeholder { color: var(--ink-faint); font-weight: 500; }
  .form-select option { background: white; }
  .form-textarea { resize: vertical; min-height: 90px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,35,50,0.55);
    backdrop-filter: blur(10px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { transform:translateY(24px); opacity:0; } to { transform:translateY(0); opacity:1; } }

  .modal {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    width: 100%;
    max-width: 500px;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.28s cubic-bezier(.34,1.56,.64,1);
    box-shadow: var(--shadow-lg);
  }

  .modal-lg { max-width: 740px; }
  .modal-xl { max-width: 920px; }

  .modal-header {
    padding: 24px 28px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'Righteous', cursive;
    font-size: 26px;
    color: var(--ink);
    letter-spacing: 0.5px;
  }

  .modal-close {
    background: var(--sky);
    border: none;
    color: var(--ink-soft);
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--sky-mid); color: var(--ink); }

  .modal-body { padding: 20px 28px 28px; }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--sky);
    border-radius: 50px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 0;
  }

  .tab {
    flex: 1;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    color: var(--ink-soft);
    border-radius: 50px;
    text-align: center;
    transition: all 0.2s;
  }
  .tab.active { background: white; color: var(--ocean); box-shadow: var(--shadow-sm); }

  /* BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.3px;
  }

  .badge-coral { background: rgba(255,107,74,0.12); color: var(--coral); }
  .badge-green { background: rgba(61,203,142,0.15); color: var(--mint-dim); }
  .badge-ocean { background: rgba(26,127,191,0.1); color: var(--ocean); }
  .badge-mango { background: rgba(255,184,48,0.15); color: #b07a00; }
  .badge-grey { background: var(--sky); color: var(--ink-soft); }

  /* DASHBOARD */
  .dashboard-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
    padding-top: 68px;
  }

  .sidebar {
    background: white;
    border-right: 1.5px solid var(--border);
    padding: 28px 12px;
    position: sticky;
    top: 68px;
    height: calc(100vh - 68px);
    overflow-y: auto;
    box-shadow: 2px 0 16px rgba(26,127,191,0.05);
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 0 12px;
    margin: 16px 0 8px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
  }
  .sidebar-item:hover { background: var(--sky); color: var(--ocean); }
  .sidebar-item.active { background: var(--sky); color: var(--ocean); }
  .sidebar-item.active .s-icon { background: var(--ocean); color: white; }

  .s-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--sky-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .main-content { padding: 40px; background: var(--page-bg); overflow: auto; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin-bottom: 36px; }

  .stat-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 20px 22px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }
  .stat-coral::before { background: var(--coral); }
  .stat-ocean::before { background: var(--ocean); }
  .stat-mango::before { background: var(--mango); }
  .stat-mint::before { background: var(--mint); }

  .stat-card-num { font-family:'Righteous',cursive; font-size: 44px; line-height: 1; margin-bottom: 4px; }
  .stat-card-label { font-size: 12px; color: var(--ink-faint); font-weight: 700; letter-spacing: 0.3px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: 16px; border: 1.5px solid var(--border); background: white; box-shadow: var(--shadow-sm); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead { background: var(--sky); }
  th { padding: 13px 16px; text-align: left; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-soft); }
  td { padding: 14px 16px; border-bottom: 1px solid var(--sky); color: var(--ink-soft); font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(232,244,253,0.5); }

  /* MAP */

// Calcola durata approssimativa tra due date e restituisce stringa leggibile
const calcDuration = (dep, arr) => {
  if (!dep || !arr) return null;
  const ms = new Date(arr) - new Date(dep);
  if (ms <= 0) return null;
  const totalMins = Math.round(ms / 60000);
  const h = Math.floor(totalMins / 60);
  const m = totalMins % 60;
  if (h === 0) return `${m} min`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}min`;
};

// Calcola durata da distanza (fallback se le date non sono attendibili)
const calcDurationFromKm = (distanceStr) => {
  if (!distanceStr) return null;
  const km = parseInt(distanceStr.replace(/[^0-9]/g,''));
  if (!km) return null;
  // stima: velocità media camion ~80km/h su autostrada, +20% per soste/traffico
  const h = km / 80;
  const hRounded = Math.round(h * 2) / 2; // arrotonda a mezz'ora
  const hFloor = Math.floor(hRounded);
  const mins = (hRounded - hFloor) * 60;
  if (mins === 0) return `~${hFloor}h`;
  return `~${hFloor}h ${mins}min`;
};

    setErr(''); setLoading(true);
    await new Promise(r=>setTimeout(r,900));
    setLoading(false);

    // resolve company
    let companyId;
    if (form.companyChoice === 'new') {
      if (!form.newCompanyName||!form.newCompanyCity) { setErr('Inserisci nome e città della nuova azienda.'); return; }
      const nc = { id: Date.now(), name: form.newCompanyName, city: form.newCompanyCity, trucks:1, drivers:1, logo:'🏢' };
      MOCK_COMPANIES.push(nc);
      companyId = nc.id;
    } else {
      companyId = parseInt(form.companyId);
    }

    const nd = {
      id: Date.now(),
      name: form.name,
      email: form.email,
      password: form.password,
      companyId,
      truck: form.truck || 'Camion Generico',
      plate: form.plate.toUpperCase(),
      experience: parseInt(form.experience) || 1,
      rating: 5.0,
      avatar: form.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2),
      bio: form.bio || `Autista professionale con ${form.experience || 1} anni di esperienza.`,
      prefs: { ...driverPrefsReg },
    };
    MOCK_DRIVERS.push(nd);
    onLogin(null, nd);
    onClose();
  };

  const modalTitle = () => {
    if (mode==='login') return '👋 Bentornato!';
    if (mode==='register') return '🎉 Crea Account';
    if (mode==='driver-login') return '🚛 Accesso Autista';
    if (mode==='driver-register') return step===1?'🚛 Registrazione Autista':step===2?'🚛 Il Tuo Camion':'🚛 Azienda & Preferenze';
    return '';

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

          {/* SUB TABS */}

          {err && <div className="alert alert-warn">⚠️ {err}</div>}

          {/* ── PASSENGER LOGIN ── */}

            <>

          {mode==='driver-register' && step===1 && (

                📋 Step 1 di 3 — Dati personali e credenziali di accesso
              </div>

                <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="••••••••" value={form.password} onChange={up('password')}/></div>

              <div style={{display:'flex',justifyContent:'flex-end'}}>

                  {DRIVER_PREFS_DEF.map(p=>(

                      title={p.desc}

                      <span className="pref-emoji">{p.emoji}</span>
                      <div className="pref-label" style={{color:driverPrefsReg[p.key]?'var(--mint-dim)':'var(--coral)'}}>

              </div>

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
                <button className="btn btn-ghost" onClick={()=>setStep(2)}>← Indietro</button>

                  {loading?<><span className="spinner"></span> Registrazione...</>:'Completa Registrazione 🚛'}
                </button>
              </div>
            </>
          )}

        </div>
      </div>
    </div>
  );
}

function TripCard({ trip, onClick }) {
  const driver = getDriver(trip.driverId);
  const company = driver ? getCompany(driver.companyId) : null;
  const pct = ((trip.seats-trip.seatsLeft)/trip.seats)*100;
  const isFull = trip.seatsLeft===0;
  const duration = calcDuration(trip.departure, trip.arrival) || calcDurationFromKm(trip.distance);
  return (
    <div className={`card trip-card`} style={{opacity:isFull?0.7:1}} onClick={()=>!isFull&&onClick(trip)}>
      <div className="trip-top">
        <div className="trip-price-tag">
          €{trip.price}
          <div className="trip-price-small">A PERSONA</div>
        </div>
        <div className="route-row">
          <div className="city">{trip.from}</div>
          <div className="route-line">
            <div className="route-dot"></div>
            <div className="route-dash"></div>
            <div className="route-arrow-icon">✈️</div>
          </div>
          <div className="city">{trip.to}</div>
        </div>
        {duration && (
          <div style={{marginTop:8,display:'inline-flex',alignItems:'center',gap:5,background:'rgba(26,127,191,0.12)',borderRadius:50,padding:'4px 12px',fontSize:12,fontWeight:800,color:'var(--ocean)'}}>
            ⏱️ {duration} di viaggio
          </div>
        )}
      </div>
      <div className="trip-body">
        <div className="trip-meta-row">
          <div className="meta-pill">📅 {fmtDate(trip.departure)}</div>
          <div className="meta-pill">⏰ {fmtTime(trip.departure)}</div>
          <div className="meta-pill">📍 {trip.distance}</div>
          <div className="meta-pill" style={{background: isFull?'rgba(255,107,74,0.1)':trip.seatsLeft===1?'rgba(255,184,48,0.15)':'var(--sky)', color:isFull?'var(--coral)':trip.seatsLeft===1?'#a07600':'var(--ink-soft)'}}>
            💺 {isFull?'Completo':`${trip.seatsLeft} posti`}
          </div>
        </div>
        {driver && (
          <div className="driver-strip">
            <div className="avatar avatar-driver" style={{width:30,height:30,fontSize:11}}>{driver.avatar}</div>
            <div style={{flex:1}}>
              <span style={{fontWeight:700,fontSize:13,color:'var(--ink)'}}>{driver.name}</span>
              <span style={{marginLeft:8}} className="company-badge">🏢 {company?.name}</span>
            </div>
            <span style={{fontSize:13,fontWeight:800,color:'#a07600'}}>★ {driver.rating}</span>
          </div>
        )}
        {/* Mini prefs preview */}
        {driver && (
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:10}}>
            {DRIVER_PREFS_DEF.slice(0,5).map(p => (
              <span key={p.key} title={p.desc} style={{fontSize:16, opacity: driver.prefs[p.key] ? 1 : 0.25}}>{p.emoji}</span>
            ))}
          </div>
        )}
        <div className="seats-bar">
          <div className="seats-fill" style={{width:`${pct}%`, background: isFull?'var(--coral)':pct>70?'var(--mango)':'var(--mint)'}}></div>
        </div>
      </div>
    </div>
  );
}

function TripsPage({ user, onLoginOpen }) {
  const [filters, setFilters] = useState({ from:'', to:'', date:'' });
  const [selTrip, setSelTrip] = useState(null);
  const [bookTrip, setBookTrip] = useState(null);
  const [toast, setToast] = useState(null);
  const [, forceUpdate] = useState(0);

  const upF = k => e => setFilters(f=>({...f,[k]:e.target.value}));

  const filtered = MOCK_TRIPS.filter(t => {
    if (filters.from && !t.from.toLowerCase().includes(filters.from.toLowerCase())) return false;
    if (filters.to && !t.to.toLowerCase().includes(filters.to.toLowerCase())) return false;
    return true;
  });

  const handleBook = (trip, seats) => {
    const i = MOCK_TRIPS.findIndex(t=>t.id===trip.id);
    if (i>=0) MOCK_TRIPS[i].seatsLeft -= seats;
    MOCK_BOOKINGS.push({ id:Date.now(), userId:user?.id||0, tripId:trip.id, status:'confirmed', seats, total:seats*trip.price, createdAt:new Date() });
    setBookTrip(null); setSelTrip(null);
    forceUpdate(n=>n+1);
    setToast({ msg:'Prenotazione confermata! Buon viaggio 🚛', type:'success' });
  };

  return (
    <div style={{paddingTop:68}}>
      {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
      <div style={{background:'linear-gradient(135deg,var(--sky),white)',borderBottom:'1.5px solid var(--border)',padding:'40px 40px 0'}}>
        <div style={{maxWidth:1200,margin:'0 auto'}}>
          <div className="page-title">Trova il Tuo <span className="accent">Prossimo Viaggio</span></div>
          <div className="page-sub">{filtered.length} viaggi disponibili</div>
        </div>
      </div>

      <div className="section">
        <div className="search-bar">
          <div className="search-field">
            <label>🏙️ Da</label>
            <input className="form-input" placeholder="Città di partenza..." value={filters.from} onChange={upF('from')}/>
          </div>
          <div className="search-field">
            <label>📍 A</label>
            <input className="form-input" placeholder="Destinazione..." value={filters.to} onChange={upF('to')}/>
          </div>
          <div className="search-field">
            <label>📅 Data</label>
            <input className="form-input" type="date" value={filters.date} onChange={upF('date')}/>
          </div>
          <button className="btn btn-primary" style={{paddingLeft:28,paddingRight:28}}>🔍 Cerca</button>
          <button className="btn btn-ghost" onClick={()=>setFilters({from:'',to:'',date:''})}>Reset</button>
        </div>

        {filtered.length===0 ? (
          <div className="empty-state">
            <span className="empty-icon">🔍</span>
            <div className="empty-title">Nessun Viaggio Trovato</div>
            <p className="empty-desc">Prova a modificare i filtri di ricerca.</p>
          </div>
        ) : (
          <div className="grid-2">
            {filtered.map(t=>(
              <TripCard key={t.id} trip={t} onClick={()=>setSelTrip(t)}/>
            ))}
          </div>
        )}
      </div>

      {selTrip && (
        <TripDetailModal
          trip={selTrip} user={user}
          onClose={()=>setSelTrip(null)}
          onBookOpen={t=>{ setBookTrip(t); setSelTrip(null); }}
        />
      )}
      {bookTrip && user && (
        <BookingModalFixed
          trip={bookTrip} user={user}
          onClose={()=>setBookTrip(null)}
          onBook={handleBook}
        />
      )}
    </div>
  );
}

            <div style={{maxWidth:640}}>
              <div className="alert alert-info" style={{marginBottom:20}}>
                💡 I passeggeri vedranno queste preferenze e dovranno accettarle prima di prenotare il tuo viaggio.
              </div>
              <div className="card"><div className="card-body">
                <div className="prefs-grid">
                  {DRIVER_PREFS_DEF.map(p=>(
                    <div
                      key={p.key}
                      className={`pref-card ${driverPrefs[p.key]?'selected':'refused'}`}
                      style={{cursor:'pointer'}}
                      onClick={()=>togglePref(p.key)}
                      title={p.desc}
                    >
                      <span className="pref-emoji">{p.emoji}</span>
                      <div className="pref-label" style={{color:driverPrefs[p.key]?'var(--mint-dim)':'var(--coral)'}}>
                        {driverPrefs[p.key]?'✓':'✗'} {p.label}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="divider"></div>
                <div style={{display:'flex',gap:12}}>
                  <button className="btn btn-ghost" onClick={()=>setDriverPrefs({...driver.prefs})}>Annulla</button>
                  <button className="btn btn-primary" onClick={savePrefs}>Salva Preferenze ✓</button>
                </div>
              </div></div>
            </div>
          </>
        )}

        {view==='truck' && (
          <>
            <div className="page-title" style={{marginBottom:24}}>Il Mio <span className="accent">Camion</span></div>
            <div style={{maxWidth:500}}>
              <div className="card"><div className="card-body">
                <div style={{textAlign:'center',padding:'20px 0',borderBottom:'1.5px solid var(--sky)',marginBottom:20}}>
                  <div style={{fontSize:80}}>🚛</div>
                  <div style={{fontFamily:'Righteous',fontSize:26,marginTop:8,color:'var(--ink)'}}>{driver.truck}</div>
                  <div className="mono" style={{color:'var(--ocean)',fontSize:16,marginTop:4}}>{driver.plate}</div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  {[{l:'Azienda',v:company?.name},{l:'Esperienza',v:`${driver.experience} anni`},{l:'Rating',v:`★ ${driver.rating}`},{l:'Viaggi',v:myTrips.length}].map((r,i)=>(
                    <div key={i} style={{background:'var(--sky)',borderRadius:12,padding:'12px 14px'}}>
                      <div style={{fontSize:10,fontWeight:800,letterSpacing:1,textTransform:'uppercase',color:'var(--ink-faint)',marginBottom:4}}>{r.l}</div>
                      <div style={{fontWeight:700,color:'var(--ink)'}}>{r.v}</div>
                    </div>
                  ))}
                </div>
              </div></div>
            </div>
          </>
        )}

      </div>

      {/* NEW TRIP MODAL */}
      {showNew && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowNew(false)}>
          <div className="modal modal-lg">
            <div className="modal-header">
              <div className="modal-title">🗺️ Crea Nuovo Viaggio</div>
              <button className="modal-close" onClick={()=>setShowNew(false)}>×</button>
            </div>
            <div className="modal-body">
              <div className="input-row">
                <div className="form-group"><label className="form-label">Partenza</label>
                  <select className="form-select" value={nt.from} onChange={upNt('from')}>
                    <option value="">Seleziona...</option>{CITIES.map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">Destinazione</label>
                  <select className="form-select" value={nt.to} onChange={upNt('to')}>
                    <option value="">Seleziona...</option>{CITIES.map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
              </div>
              <div className="input-row">
                <div className="form-group"><label className="form-label">Data Partenza</label><input className="form-input" type="date" value={nt.date} onChange={upNt('date')} min={new Date().toISOString().split('T')[0]}/></div>
                <div className="form-group"><label className="form-label">Orario</label><input className="form-input" type="time" value={nt.time} onChange={upNt('time')}/></div>
              </div>
              <div className="input-row">
                <div className="form-group"><label className="form-label">Posti Disponibili</label>
                  <select className="form-select" value={nt.seats} onChange={upNt('seats')}>
                    {[1,2,3,4,5,6].map(n=><option key={n} value={n}>{n} posto/i</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">Prezzo per Posto (€)</label><input className="form-input" type="number" min="5" max="200" value={nt.price} onChange={upNt('price')}/></div>
              </div>
              <div className="form-group"><label className="form-label">Note per i Passeggeri</label><textarea className="form-textarea" placeholder="Es: sosta Bologna, animali ammessi..." value={nt.notes} onChange={upNt('notes')}/></div>
              {nt.from && nt.to && <div style={{marginBottom:16}}><MapView from={nt.from} to={nt.to} height={180}/></div>}
              <div style={{display:'flex',justifyContent:'flex-end',gap:12}}>
                <button className="btn btn-ghost" onClick={()=>setShowNew(false)}>Annulla</button>
                <button className="btn btn-primary btn-lg" onClick={createTrip}>Pubblica Viaggio 🚀</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState('home');
  const [user, setUser] = useState(null);
  const [driver, setDriver] = useState(null);
  const [authModal, setAuthModal] = useState(null);
  const [toast, setToast] = useState(null);

  const handleLogin = (u, d) => {
    setUser(u); setDriver(d);
    setToast({ msg:`Benvenuto${d?' autista':''}, ${(u||d).name.split(' ')[0]}! 🎉`, type:'success' });
    if (d) setPage('driver-dash');
    else if (u) setPage('user-dash');
  };

  const handleLogout = () => {
    setUser(null); setDriver(null); setPage('home');
    setToast({ msg:'Arrivederci! A presto 👋', type:'success' });
  };

  return (
    <div>
      {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
      <Nav user={user} driver={driver} onLoginOpen={m=>setAuthModal(m)} onLogout={handleLogout} onNavigate={setPage} currentPage={page}/>
      {page==='home' && <HomePage onNavigate={setPage} onLoginOpen={m=>setAuthModal(m)}/>}
      {page==='trips' && <TripsPage user={user} onLoginOpen={m=>setAuthModal(m)}/>}
      {page==='user-dash' && user && <UserDashboard user={user} onNavigate={setPage}/>}
      {page==='driver-dash' && driver && <DriverDashboard driver={driver}/>}
      {page==='user-dash' && !user && (
        <div style={{paddingTop:120,textAlign:'center'}}>
          <div style={{fontSize:64,marginBottom:16}}>🔒</div>
          <div style={{fontFamily:'Righteous',fontSize:36,marginBottom:16,color:'var(--ink)'}}>Accesso Richiesto</div>
          <button className="btn btn-primary btn-lg" onClick={()=>setAuthModal('login')}>Accedi →</button>
        </div>
      )}
      {authModal && <AuthModal mode={authModal} onClose={()=>setAuthModal(null)} onLogin={handleLogin}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
