<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick Up! — Sali a Bordo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js?v=2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sky:       #e8f4fd;
    --sky-mid:   #bde0f7;
    --sky-deep:  #5bb8f5;
    --ocean:     #1a7fbf;
    --ocean-dark:#135d8c;
    --coral:     #ff6b4a;
    --coral-dim: #e55030;
    --mango:     #ffb830;
    --mango-dim: #e09f20;
    --mint:      #3dcb8e;
    --mint-dim:  #2aad74;
    --sand:      #fff8ed;
    --white:     #ffffff;
    --ink:       #1a2332;
    --ink-mid:   #2d3e55;
    --ink-soft:  #4a6278;
    --ink-faint: #8aa0b2;
    --border:    #d4e6f0;
    --border-mid:#b8d5e8;
    --card-bg:   #ffffff;
    --page-bg:   #f0f8ff;
    --shadow-sm: 0 2px 8px rgba(26,127,191,0.08);
    --shadow-md: 0 4px 24px rgba(26,127,191,0.13);
    --shadow-lg: 0 12px 48px rgba(26,127,191,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--page-bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--sky); }
  ::-webkit-scrollbar-thumb { background: var(--sky-deep); border-radius: 3px; }

  /* WAVE DECORATION */
  .wave-divider {
    width: 100%;
    overflow: hidden;
    line-height: 0;
    margin-bottom: -2px;
  }
  .wave-divider svg { display: block; width: 100%; }

  /* TYPOGRAPHY */
  .righteous { font-family: 'Righteous', cursive; }
  .mono { font-family: 'DM Mono', monospace; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 68px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1.5px solid var(--border);
    box-shadow: 0 2px 16px rgba(26,127,191,0.07);
  }

  .nav-logo {
    font-family: 'Righteous', cursive;
    font-size: 26px;
    color: var(--ocean);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
  }

  .nav-logo .excl { color: var(--coral); }
  .nav-logo .dot { 
    width: 10px; height: 10px; background: var(--mango);
    border-radius: 50%; display: inline-block;
    animation: bounceDot 1.8s ease-in-out infinite;
  }
  @keyframes bounceDot {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-link {
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .nav-link:hover { background: var(--sky); color: var(--ocean); }
  .nav-link.active { background: var(--sky); color: var(--ocean); }

  .nav-actions { display: flex; gap: 10px; align-items: center; }

  /* BUTTONS */
  .btn {
    padding: 10px 22px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--coral), #ff8060);
    color: white;
    box-shadow: 0 4px 16px rgba(255,107,74,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,74,0.45); }

  .btn-ocean {
    background: linear-gradient(135deg, var(--ocean), var(--sky-deep));
    color: white;
    box-shadow: 0 4px 16px rgba(26,127,191,0.3);
  }
  .btn-ocean:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,127,191,0.4); }

  .btn-mango {
    background: linear-gradient(135deg, var(--mango), #ffc850);
    color: var(--ink);
    box-shadow: 0 4px 16px rgba(255,184,48,0.3);
  }
  .btn-mango:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,184,48,0.45); }

  .btn-outline {
    background: white;
    color: var(--ocean);
    border: 2px solid var(--sky-deep);
  }
  .btn-outline:hover { background: var(--sky); border-color: var(--ocean); }

  .btn-ghost {
    background: var(--sky);
    color: var(--ocean);
  }
  .btn-ghost:hover { background: var(--sky-mid); }

  .btn-white {
    background: white;
    color: var(--coral);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .btn-white:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

  .btn-sm { padding: 7px 16px; font-size: 13px; }
  .btn-lg { padding: 14px 32px; font-size: 16px; }
  .btn-full { width: 100%; justify-content: center; }

  /* HERO */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(160deg, #1a7fbf 0%, #2196d3 35%, #5bb8f5 65%, #8fd4f8 100%);
    padding-top: 68px;
  }

  /* Floating clouds */
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.25);
    border-radius: 50px;
    filter: blur(1px);
  }
  .cloud::before, .cloud::after {
    content:'';
    position:absolute;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
  }
  .c1 { width:120px;height:40px;top:15%;left:8%;animation:cloudFloat 18s linear infinite; }
  .c1::before{width:50px;height:50px;top:-20px;left:20px;}
  .c1::after{width:35px;height:35px;top:-15px;left:55px;}
  .c2 { width:80px;height:28px;top:25%;right:12%;animation:cloudFloat 22s linear infinite reverse; opacity:0.7; }
  .c2::before{width:36px;height:36px;top:-16px;left:12px;}
  .c2::after{width:24px;height:24px;top:-10px;left:40px;}
  .c3 { width:160px;height:48px;top:60%;left:5%;animation:cloudFloat 26s linear infinite; opacity:0.5; }
  .c3::before{width:64px;height:64px;top:-26px;left:28px;}
  .c3::after{width:48px;height:48px;top:-20px;left:78px;}

  @keyframes cloudFloat {
    0%   { transform: translateX(-40px); }
    50%  { transform: translateX(40px); }
    100% { transform: translateX(-40px); }
  }

  /* Road at bottom of hero */
  .hero-road-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 180px;
  }

  .truck-wrap {
    position: absolute;
    bottom: 60px;
    animation: truckDrive 18s linear infinite;
    font-size: 56px;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
    z-index: 2;
  }
  @keyframes truckDrive {
    from { left: -90px; }
    to { left: 110%; }
  }

  /* Sun decoration */
  .sun {
    position: absolute;
    top: 60px;
    right: 80px;
    width: 80px;
    height: 80px;
    background: var(--mango);
    border-radius: 50%;
    box-shadow: 0 0 0 16px rgba(255,184,48,0.2), 0 0 0 32px rgba(255,184,48,0.1);
    animation: sunPulse 4s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%,100% { box-shadow: 0 0 0 16px rgba(255,184,48,0.2), 0 0 0 32px rgba(255,184,48,0.1); }
    50% { box-shadow: 0 0 0 24px rgba(255,184,48,0.25), 0 0 0 48px rgba(255,184,48,0.08); }
  }

  .hero-content {
    position: relative;
    z-index: 3;
    text-align: center;
    max-width: 800px;
    padding: 0 24px 80px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    color: white;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }

  .hero-title {
    font-family: 'Righteous', cursive;
    font-size: clamp(56px, 11vw, 130px);
    color: white;
    line-height: 0.95;
    text-shadow: 0 4px 20px rgba(0,0,0,0.15);
    margin-bottom: 8px;
  }

  .hero-title .pickup-excl { color: var(--mango); }

  .hero-sub-title {
    font-family: 'Righteous', cursive;
    font-size: clamp(20px, 4vw, 42px);
    color: rgba(255,255,255,0.85);
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  .hero-desc {
    font-size: 17px;
    color: rgba(255,255,255,0.88);
    max-width: 500px;
    margin: 0 auto 40px;
    line-height: 1.75;
    font-weight: 500;
  }

  .hero-ctas {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }

  .hero-stats {
    display: flex;
    gap: 40px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    padding: 16px 28px;
  }

  .hero-stat-num {
    font-family: 'Righteous', cursive;
    font-size: 36px;
    color: white;
    line-height: 1;
  }

  .hero-stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  /* SECTION */
  .section {
    padding: 80px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--sky);
    color: var(--ocean);
    border-radius: 50px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .section-title {
    font-family: 'Righteous', cursive;
    font-size: clamp(32px, 4vw, 56px);
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 48px;
  }

  .section-title .accent { color: var(--coral); }

  /* CARDS */
  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s;
    box-shadow: var(--shadow-sm);
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }

  .card-body { padding: 24px; }

  /* TRIP CARD */
  .trip-card { cursor: pointer; }

  .trip-top {
    background: linear-gradient(135deg, var(--sky) 0%, #ddf0ff 100%);
    padding: 20px 24px 16px;
    position: relative;
    overflow: hidden;
  }

  .trip-top::after {
    content: '🚛';
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    opacity: 0.18;
  }

  .route-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .city {
    font-family: 'Righteous', cursive;
    font-size: 22px;
    color: var(--ink);
  }

  .route-line {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .route-dot {
    width: 8px; height: 8px;
    background: var(--coral);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .route-dash {
    flex: 1;
    height: 2px;
    background: repeating-linear-gradient(to right, var(--sky-deep) 0px, var(--sky-deep) 6px, transparent 6px, transparent 12px);
  }

  .route-arrow-icon {
    font-size: 16px;
    flex-shrink: 0;
  }

  .trip-price-tag {
    position: absolute;
    top: 0; right: 60px;
    background: var(--coral);
    color: white;
    font-family: 'Righteous', cursive;
    font-size: 22px;
    padding: 6px 16px 8px;
    border-radius: 0 0 14px 14px;
    box-shadow: 0 4px 12px rgba(255,107,74,0.35);
  }

  .trip-price-small { font-size: 11px; font-family:'Nunito',sans-serif; font-weight:700; opacity:0.85; }

  .trip-body { padding: 16px 24px 20px; }

  .trip-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 14px;
  }

  .meta-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--sky);
    color: var(--ink-soft);
    padding: 5px 12px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
  }

  .driver-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--sand);
    border-radius: 12px;
    border: 1px solid #ffe8cc;
  }

  .seats-bar { height: 5px; background: var(--sky-mid); border-radius: 3px; margin-top: 14px; overflow: hidden; }
  .seats-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 20px; }

  /* FORMS */
  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 7px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 11px 16px;
    background: var(--sky);
    border: 1.5px solid var(--border-mid);
    border-radius: 12px;
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--sky-deep);
    background: white;
    box-shadow: 0 0 0 3px rgba(91,184,245,0.18);
  }

  .form-input::placeholder { color: var(--ink-faint); font-weight: 500; }
  .form-select option { background: white; }
  .form-textarea { resize: vertical; min-height: 90px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,35,50,0.55);
    backdrop-filter: blur(10px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { transform:translateY(24px); opacity:0; } to { transform:translateY(0); opacity:1; } }

  .modal {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    width: 100%;
    max-width: 500px;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.28s cubic-bezier(.34,1.56,.64,1);
    box-shadow: var(--shadow-lg);
  }

  .modal-lg { max-width: 740px; }
  .modal-xl { max-width: 920px; }

  .modal-header {
    padding: 24px 28px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'Righteous', cursive;
    font-size: 26px;
    color: var(--ink);
    letter-spacing: 0.5px;
  }

  .modal-close {
    background: var(--sky);
    border: none;
    color: var(--ink-soft);
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--sky-mid); color: var(--ink); }

  .modal-body { padding: 20px 28px 28px; }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--sky);
    border-radius: 50px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 0;
  }

  .tab {
    flex: 1;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    color: var(--ink-soft);
    border-radius: 50px;
    text-align: center;
    transition: all 0.2s;
  }
  .tab.active { background: white; color: var(--ocean); box-shadow: var(--shadow-sm); }

  /* BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.3px;
  }

  .badge-coral { background: rgba(255,107,74,0.12); color: var(--coral); }
  .badge-green { background: rgba(61,203,142,0.15); color: var(--mint-dim); }
  .badge-ocean { background: rgba(26,127,191,0.1); color: var(--ocean); }
  .badge-mango { background: rgba(255,184,48,0.15); color: #b07a00; }
  .badge-grey { background: var(--sky); color: var(--ink-soft); }

  /* DASHBOARD */
  .dashboard-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
    padding-top: 68px;
  }

  .sidebar {
    background: white;
    border-right: 1.5px solid var(--border);
    padding: 28px 12px;
    position: sticky;
    top: 68px;
    height: calc(100vh - 68px);
    overflow-y: auto;
    box-shadow: 2px 0 16px rgba(26,127,191,0.05);
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 0 12px;
    margin: 16px 0 8px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
  }
  .sidebar-item:hover { background: var(--sky); color: var(--ocean); }
  .sidebar-item.active { background: var(--sky); color: var(--ocean); }
  .sidebar-item.active .s-icon { background: var(--ocean); color: white; }

  .s-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--sky-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .main-content { padding: 40px; background: var(--page-bg); overflow: auto; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin-bottom: 36px; }

  .stat-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 20px 22px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }
  .stat-coral::before { background: var(--coral); }
  .stat-ocean::before { background: var(--ocean); }
  .stat-mango::before { background: var(--mango); }
  .stat-mint::before { background: var(--mint); }

  .stat-card-num { font-family:'Righteous',cursive; font-size: 44px; line-height: 1; margin-bottom: 4px; }
  .stat-card-label { font-size: 12px; color: var(--ink-faint); font-weight: 700; letter-spacing: 0.3px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: 16px; border: 1.5px solid var(--border); background: white; box-shadow: var(--shadow-sm); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead { background: var(--sky); }
  th { padding: 13px 16px; text-align: left; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-soft); }
  td { padding: 14px 16px; border-bottom: 1px solid var(--sky); color: var(--ink-soft); font-weight: 600; }
  tr:last-child td { border-bottom: none; }

// ─── CITY AUTOCOMPLETE ────────────────────────────────────────────────────────

function CityAutocomplete({ value, onChange, placeholder, label, id }) {
  const [query, setQuery]         = useState(value || '');
  const [results, setResults]     = useState([]);
  const [open, setOpen]           = useState(false);
  const [highlighted, setHighlighted] = useState(-1);
  const [selFlag, setSelFlag]     = useState('');
  const wrapRef  = useRef(null);
  const inputRef = useRef(null);

  // Aggiorna risultati ogni volta che query cambia (senza blocchi inutili)
  useEffect(() => {
    if (!query || query.trim().length < 1) { setResults([]); return; }
    setResults(searchCities(query));
  }, [query]);

  // Sync value esterno (es. reset filtri)
  useEffect(() => {
    setQuery(value || '');
    if (!value) setSelFlag('');
  }, [value]);

  // Chiudi cliccando fuori
  useEffect(() => {
    const h = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const select = (item) => {
    setQuery(item.name);
    setSelFlag(item.flag);
    onChange(item.name);
    setOpen(false);
    setResults([]);
    setHighlighted(-1);
  };

  const handleChange = (e) => {
    const v = e.target.value;
    setQuery(v);
    setSelFlag('');
    if (!v) onChange('');
    setOpen(true);
    setHighlighted(-1);
  };

  const handleKey = (e) => {
    if (!open || !results.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setHighlighted(h => Math.min(h + 1, results.length - 1)); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setHighlighted(h => Math.max(h - 1, 0)); }
    if (e.key === 'Enter' && highlighted >= 0) select(results[highlighted]);
    if (e.key === 'Escape') setOpen(false);
  };

  const clear = () => {
    setQuery(''); setSelFlag(''); onChange(''); setResults([]);
    inputRef.current?.focus();
  };

  // Calcola i risultati correnti in modo sincrono per evitare flash "nessun risultato"
  const liveResults = query.trim().length >= 1 ? (results.length > 0 ? results : searchCities(query)) : [];

  return (
    <div className="city-autocomplete" ref={wrapRef}>
      {label && <label className="form-label" htmlFor={id}>{label}</label>}
      <div className="city-input-wrap">
        {selFlag && <span className="city-input-flag">{selFlag}</span>}
        <input
          id={id}
          ref={inputRef}
          className={`form-input ${selFlag ? '' : 'no-flag'}`}
          placeholder={placeholder || 'Cerca città europea...'}
          value={query}
          onChange={handleChange}
          onFocus={() => { if (query.length >= 1) setOpen(true); }}
          onKeyDown={handleKey}
          autoComplete="off"
        />
        {query && <button className="city-clear" onClick={clear}>×</button>}
      </div>

      {open && query.trim().length >= 1 && (
        <div className="city-dropdown">
          {liveResults.length === 0 ? (
            <div className="city-no-results">🔍 Nessun risultato per "<strong>{query}</strong>"</div>
          ) : (
            liveResults.map((item, i) => (
              <div
                key={`${item.name}-${i}`}
                className={`city-dropdown-item ${highlighted === i ? 'highlighted' : ''}`}
                onMouseDown={() => select(item)}
                onMouseEnter={() => setHighlighted(i)}
              >
                <span style={{fontSize:20,lineHeight:1}}>{item.flag}</span>
                <span style={{fontWeight:700,flex:1}}>{item.name}</span>
                <span className="city-country">{item.country}</span>
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
}

// ─── PHOTO UPLOAD ─────────────────────────────────────────────────────────────

function PhotoUpload({ value, onChange, label = 'Foto Profilo', hint = 'JPG, PNG fino a 5MB' }) {
  const fileRef = useRef(null);
  const [preview, setPreview] = useState(value || null);
  const [dragging, setDragging] = useState(false);

  const processFile = (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      setPreview(dataUrl);
      onChange(dataUrl);
    };
    reader.readAsDataURL(file);
  };

  const handleFile = (e) => processFile(e.target.files[0]);

  const handleDrop = (e) => {
    e.preventDefault();
    setDragging(false);
    processFile(e.dataTransfer.files[0]);
  };

  const remove = (e) => {
    e.stopPropagation();
    setPreview(null);
    onChange(null);
    if (fileRef.current) fileRef.current.value = '';
  };

  return (
    <div className="form-group">
      {label && <label className="form-label">{label}</label>}
      <div
        className={`photo-upload-zone ${preview ? 'has-photo' : ''} ${dragging ? 'dragging' : ''}`}
        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={handleDrop}
        onClick={() => !preview && fileRef.current?.click()}
        style={{ cursor: preview ? 'default' : 'pointer' }}
      >
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:'none'}}/>
        {preview ? (
          <>
            <img src={preview} alt="Foto profilo" className="photo-preview"/>
            <div style={{fontSize:13,fontWeight:700,color:'var(--mint-dim)',marginBottom:8}}>✓ Foto caricata!</div>
            <div style={{display:'flex',gap:8,justifyContent:'center'}}>
              <button className="btn btn-ghost btn-sm" onClick={(e)=>{e.stopPropagation();fileRef.current?.click();}}>
                📷 Cambia foto
              </button>
              <button className="btn btn-sm" style={{background:'rgba(255,107,74,0.1)',color:'var(--coral)',border:'1px solid rgba(255,107,74,0.2)'}} onClick={remove}>
                🗑️ Rimuovi
              </button>
            </div>
          </>
        ) : (
          <>
            <div style={{fontSize:48,marginBottom:12}}>📷</div>
            <div style={{fontWeight:800,fontSize:14,color:'var(--ink)',marginBottom:6}}>
              {dragging ? 'Rilascia qui la foto!' : 'Carica una foto profilo'}
            </div>
            <div style={{fontSize:12,color:'var(--ink-faint)',marginBottom:16}}>{hint}</div>
            <button className="btn btn-ocean btn-sm" onClick={(e)=>{e.stopPropagation();fileRef.current?.click();}}>
              📂 Scegli file
            </button>
            <div style={{fontSize:11,color:'var(--ink-faint)',marginTop:10}}>oppure trascina l'immagine qui</div>
          </>
        )}
      </div>
    </div>
  );
}

// Lista piatta di tutte le città per dropdown
const ALL_EU_CITIES = Object.entries(EU_LOCATIONS).flatMap(([country, cities]) =>
  cities.map(c => ({ city: c, country }))
);

// ── Ricerca locale smart: normalizza accenti, cerca inizio e sottostringa ──
const normalize = (s) =>
  s.toLowerCase()
   .normalize('NFD')
   .replace(/[\u0300-\u036f]/g, '');  // è→e, ü→u, ç→c, ą→a …

const searchCities = (q) => {
  if (!q || q.trim().length < 1) return [];
  const nq = normalize(q.trim());
  const startsWith = [];
  const contains   = [];
  for (const { city, country } of ALL_EU_CITIES) {
    const nc = normalize(city);
    if (nc === nq)           { startsWith.unshift({ city, country }); continue; }
    if (nc.startsWith(nq))   { startsWith.push({ city, country }); continue; }
    if (nc.includes(nq))     { contains.push({ city, country }); }
  }
  return [...startsWith, ...contains].slice(0, 10).map(({ city, country }) => ({
    name:    city,
    flag:    country.split(' ')[0],
    country: country.replace(/^\S+\s/, ''),
  }));
};

// Helper per trovare paese dalla città
const getCityCountry = (cityName) => {
  const found = ALL_EU_CITIES.find(c => c.city === cityName);
  return found ? found.country.split(' ')[1] : '';
};

// Legge tutti i viaggi attivi (con dati autista e azienda)
const dbGetTrips = async (filters={}) => {
  let q = supabase
    .from('trips')
    .select('*, driver:drivers(*, company:companies(*))')
    .eq('status', 'active')
    .gte('departure', new Date().toISOString())
    .order('departure', { ascending: true });
  if (filters.from) q = q.ilike('from_city', `%${filters.from}%`);
  if (filters.to)   q = q.ilike('to_city',   `%${filters.to}%`);
  if (filters.date) q = q.gte('departure', filters.date).lt('departure', filters.date + 'T23:59:59');
  const { data, error } = await q;
  if (error) { console.error(error); return []; }
  // Normalizza i campi per compatibilità con il resto dell'app
  return (data || []).map(t => ({
    ...t,
    from: t.from_city, to: t.to_city,
    seatsLeft: t.seats_left, driverId: t.driver_id,
    driver: t.driver ? { ...t.driver, verified: t.driver.verified === true } : null,
  }));
};

// Pubblica un nuovo viaggio
const dbCreateTrip = async (driverId, nt) => {
  const dep = new Date(nt.date + 'T' + nt.time);
  const arr = new Date(dep.getTime() + 6 * 3600000); // stima +6h
  const { data, error } = await supabase.from('trips').insert({
    driver_id: driverId, from_city: nt.from, to_city: nt.to,
    departure: dep.toISOString(), arrival: arr.toISOString(),
    seats: parseInt(nt.seats), seats_left: parseInt(nt.seats),
    price: parseFloat(nt.price), notes: nt.notes || '',
    meeting_point: nt.meetingPoint || '',
    status: 'active',
  }).select().single();
  if (error) throw error;
  return data;
};

// Prenota un viaggio
const dbBookTrip = async (userId, tripId, seats, total) => {
  // Usa una transazione: decrementa seats_left e crea booking
  const { data: trip } = await supabase.from('trips').select('seats_left').eq('id', tripId).single();
  if (!trip || trip.seats_left < seats) throw new Error('Posti non disponibili');
  const { error: e1 } = await supabase.from('trips').update({ seats_left: trip.seats_left - seats }).eq('id', tripId);
  if (e1) throw e1;
  const { data, error: e2 } = await supabase.from('bookings').insert({
    user_id: userId, trip_id: tripId, seats, total, status: 'confirmed',
  }).select().single();
  if (e2) throw e2;
  return data;
};

// Carica documento di verifica su Supabase Storage
const dbUploadDocument = async (driverId, file) => {
  const ext = file.name.split('.').pop().toLowerCase();
  const path = `${driverId}/document_${Date.now()}.${ext}`;
  const { data, error } = await supabase.storage.from('documents').upload(path, file, { upsert: true });
  if (error) throw error;
  // Ottieni URL firmato (valido 1 ora - per uso admin)
  const { data: urlData } = await supabase.storage.from('documents').createSignedUrl(path, 3600);
  return urlData?.signedUrl || path;
};

  await supabase.from('drivers').update({ verified: approved, verification_status: status }).eq('id', driverId);
  await supabase.from('verifications').update({ status, notes, reviewed_at: new Date().toISOString() }).eq('driver_id', driverId).eq('status', 'pending');
};

const dbCancelBooking = async (bookingId, tripId, seats) => {
  // Aggiorna stato booking
  const { error: e1 } = await supabase.from('bookings')
    .update({ status: 'cancelled' }).eq('id', bookingId);
  if (e1) throw e1;
  // Restituisce i posti al viaggio
  const { data: trip } = await supabase.from('trips').select('seats_left').eq('id', tripId).single();
  if (trip) {
    await supabase.from('trips').update({ seats_left: trip.seats_left + seats }).eq('id', tripId);
  }
};

// Calcola durata approssimativa tra due date e restituisce stringa leggibile
const calcDuration = (dep, arr) => {
  if (!dep || !arr) return null;
  const ms = new Date(arr) - new Date(dep);
  if (ms <= 0) return null;
  const totalMins = Math.round(ms / 60000);
  const h = Math.floor(totalMins / 60);
  const m = totalMins % 60;
  if (h === 0) return `${m} min`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}min`;
};

// Calcola durata da distanza (fallback se le date non sono attendibili)
const calcDurationFromKm = (distanceStr) => {
  if (!distanceStr) return null;
  const km = parseInt(distanceStr.replace(/[^0-9]/g,''));
  if (!km) return null;
  // stima: velocità media camion ~80km/h su autostrada, +20% per soste/traffico
  const h = km / 80;
  const hRounded = Math.round(h * 2) / 2; // arrotonda a mezz'ora
  const hFloor = Math.floor(hRounded);
  const mins = (hRounded - hFloor) * 60;
  if (mins === 0) return `~${hFloor}h`;
  return `~${hFloor}h ${mins}min`;
};

    if (mode === 'driver-register') dbGetCompanies().then(setCompanies);

    setErr(''); setLoading(true);
    try {
      if (mode==='login') {
        // Login passeggero via Supabase Auth
        const { data, error } = await supabase.auth.signInWithPassword({ email: form.email, password: form.password });
        if (error) { setErr('Email o password errati.'); return; }
        // Leggi profilo utente dalla tabella users
        const { data: profile } = await supabase.from('users').select('*').eq('id', data.user.id).single();
        const u = { id: data.user.id, name: profile?.name || data.user.email, email: data.user.email, avatar: (profile?.name||data.user.email).split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) };
        onLogin(u, null); onClose(); return;
      }
      if (mode==='driver-login') {
        // Login autista via Supabase Auth
        const { data, error } = await supabase.auth.signInWithPassword({ email: form.email, password: form.password });
        if (error) { setErr('Credenziali non valide.'); return; }
        // Leggi profilo autista
        const { data: drv, error: de } = await supabase.from('drivers').select('*, company:companies(*)').eq('auth_id', data.user.id).single();
        if (de || !drv) { setErr('Profilo autista non trovato. Usa "Registrati".'); return; }
        onLogin(null, { ...drv, companyId: drv.company_id, photoUrl: drv.photo_url, avatar: drv.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) }); onClose(); return;
      }
      if (mode==='register') {
        // Registrazione passeggero
        if (!form.name||!form.email||!form.password) { setErr('Compila tutti i campi.'); return; }
        if (form.password !== form.confirmPassword) { setErr('Le password non coincidono.'); return; }
        const { data, error } = await supabase.auth.signUp({ email: form.email, password: form.password });
        if (error) { setErr(error.message); return; }
        // Salva nome nella tabella users
        await supabase.from('users').insert({ id: data.user.id, name: form.name, email: form.email });
        const nu = { id: data.user.id, name: form.name, email: form.email, avatar: form.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) };
        onLogin(nu, null); onClose();
      }
    } catch(e) {
      setErr('Errore di connessione. Riprova.');
      console.error(e);
    } finally {
      setLoading(false);
    }
  };

  const submitDriverRegStep1 = () => {
    setErr('');

function TripCard({ trip, onClick }) {
  const driver = trip.driver || trip._driver || { name:'Autista', rating:5.0, experience:1, truck:'Camion', plate:'', avatar:'A', prefs:{}, id: trip.driverId };
  const company = driver ? getCompany(driver.companyId) : null;
  const pct = ((trip.seats-trip.seatsLeft)/trip.seats)*100;
  const isFull = trip.seatsLeft===0;
  const duration = calcDuration(trip.departure, trip.arrival) || calcDurationFromKm(trip.distance);
  return (
    <div className={`card trip-card`} style={{opacity:isFull?0.7:1}} onClick={()=>!isFull&&onClick(trip)}>
      <div className="trip-top">

        </div>

          <div className="city">{trip.from}</div>

            <div className="route-dot"></div>
            <div className="route-dash"></div>
            <div className="route-arrow-icon">✈️</div>
          </div>
          <div className="city">{trip.to}</div>
        </div>
        {duration && (
          <div style={{marginTop:8,display:'inline-flex',alignItems:'center',gap:5,background:'rgba(26,127,191,0.12)',borderRadius:50,padding:'4px 12px',fontSize:12,fontWeight:800,color:'var(--ocean)'}}>
            ⏱️ {duration} di viaggio
          </div>
        )}
      </div>
      <div className="trip-body">
        <div className="trip-meta-row">
          <div className="meta-pill">📅 {fmtDate(trip.departure)}</div>
          <div className="meta-pill">⏰ {fmtTime(trip.departure)}</div>
          <div className="meta-pill">📍 {trip.distance}</div>
          <div className="meta-pill" style={{background: isFull?'rgba(255,107,74,0.1)':trip.seatsLeft===1?'rgba(255,184,48,0.15)':'var(--sky)', color:isFull?'var(--coral)':trip.seatsLeft===1?'#a07600':'var(--ink-soft)'}}>
            💺 {isFull?'Completo':`${trip.seatsLeft} posti`}
          </div>
        </div>
        {driver && (
          <div className="driver-strip">
            <DriverPhoto driver={driver} size={30}/>
            <div style={{flex:1}}>
              <span style={{fontWeight:700,fontSize:13,color:'var(--ink)'}}>{driver.name}</span>
              <span style={{marginLeft:8}} className="company-badge">🏢 {company?.name}</span>
            </div>
            <span style={{fontSize:13,fontWeight:800,color:'#a07600'}}>★ {driver.rating}</span>
          </div>
        )}
        {/* Mini prefs preview */}
        {driver && (
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:10}}>
            {DRIVER_PREFS_DEF.slice(0,5).map(p => (
              <span key={p.key} title={p.desc} style={{fontSize:16, opacity: (driver.prefs || {})[p.key] ? 1 : 0.25}}>{p.emoji}</span>
            ))}
          </div>
        )}
        <div className="seats-bar">
          <div className="seats-fill" style={{width:`${pct}%`, background: isFull?'var(--coral)':pct>70?'var(--mango)':'var(--mint)'}}></div>
        </div>
      </div>
    </div>
  );
}

      </div>
    </div>

// ─── TRIPS PAGE ───────────────────────────────────────────────────────────────

function TripsPage({ user, onLoginOpen }) {
  const [filters, setFilters] = useState({ from:'', to:'', date:'' });
  const [trips, setTrips] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selTrip, setSelTrip] = useState(null);
  const [bookTrip, setBookTrip] = useState(null);
  const [toast, setToast] = useState(null);

  // Carica viaggi reali da Supabase
  useEffect(() => {
    const load = async () => {
      setLoading(true);
      const data = await dbGetTrips(filters);
      setTrips(data);
      setLoading(false);
    };
    load();
  }, [filters.from, filters.to, filters.date]);

  const filtered = trips; // il filtro è già fatto lato DB

  const handleBook = async (trip, seats) => {
    if (!user) { onLoginOpen('login'); return; }
    try {
      const booking = await dbBookTrip(user.id, trip.id, seats, seats * trip.price);
      // Aggiorna seats_left localmente
      setTrips(ts => ts.map(t => t.id === trip.id ? { ...t, seatsLeft: t.seatsLeft - seats } : t));
      setBookTrip(null); setSelTrip(null);
      setToast({ msg:'Prenotazione confermata! Controlla la tua email 📧', type:'success' });
      // Manda email di conferma (in background, non blocca UI)
      const drv = trip.driver || {};
      sendBookingEmail({
        passengerEmail: user.email,
        passengerName: user.name,
        driverName: drv.name || 'Autista',
        driverPhone: drv.phone || null,
        fromCity: trip.from_city || trip.from,
        toCity: trip.to_city || trip.to,
        departure: trip.departure,
        meetingPoint: trip.meeting_point || '',
        seats,
        total: seats * trip.price,
        bookingId: booking?.id || Date.now().toString(),
      });
    } catch(e) {
      setToast({ msg: e.message || 'Errore nella prenotazione', type:'error' });
    }
  };

  return (
    <div style={{paddingTop:68}}>
      {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
      <div style={{background:'linear-gradient(135deg,var(--sky),white)',borderBottom:'1.5px solid var(--border)',padding:'40px 40px 0'}}>
        <div style={{maxWidth:1200,margin:'0 auto'}}>
          <div className="page-title">Trova il Tuo <span className="accent">Prossimo Viaggio</span></div>
          <div className="page-sub">{filtered.length} viaggi disponibili in tutta Europa</div>
        </div>
      </div>

      <div className="section">
        <div className="search-bar">
          <div className="search-field" style={{minWidth:220}}>
            <label>🏙️ Da</label>
            <CityAutocomplete
              id="search-from"
              value={filters.from}
              onChange={v => setFilters(f=>({...f, from:v}))}
              placeholder="Città di partenza..."
            />
          </div>
          <div className="search-field" style={{minWidth:220}}>
            <label>📍 A</label>
            <CityAutocomplete
              id="search-to"
              value={filters.to}
              onChange={v => setFilters(f=>({...f, to:v}))}
              placeholder="Destinazione europea..."
            />
          </div>
          <div className="search-field">
            <label>📅 Data</label>
            <input className="form-input" type="date" value={filters.date} onChange={e=>setFilters(f=>({...f,date:e.target.value}))}/>
          </div>
          <button className="btn btn-primary" style={{paddingLeft:28,paddingRight:28}}>🔍 Cerca</button>
          <button className="btn btn-ghost" onClick={()=>setFilters({from:'',to:'',date:''})}>Reset</button>
        </div>

        {loading ? (
          <div className="empty-state">
            <div className="spinner" style={{width:40,height:40,margin:'0 auto 16px'}}></div>
            <div className="empty-title">Caricamento viaggi...</div>
          </div>
        ) : filtered.length===0 ? (
          <div className="empty-state">
            <span className="empty-icon">🔍</span>
            <div className="empty-title">Nessun Viaggio Trovato</div>
            <p className="empty-desc">Non ci sono ancora viaggi disponibili. Torna presto!</p>
          </div>
        ) : (
          <div className="grid-2">
            {filtered.map(t=>(
              <TripCard key={t.id} trip={t} onClick={()=>setSelTrip(t)}/>
            ))}
          </div>
        )}
      </div>

      {selTrip && (
        <TripDetailModal
          trip={selTrip} user={user}
          onClose={()=>setSelTrip(null)}
          onBookOpen={t=>{ setBookTrip(t); setSelTrip(null); }}
        />
      )}
      {bookTrip && user && (
        <BookingModalFixed
          trip={bookTrip} user={user}
          onClose={()=>setBookTrip(null)}
          onBook={handleBook}
        />
      )}
    </div>
  );
}

// ─── USER DASHBOARD ───────────────────────────────────────────────────────────

function UserDashboard({ user, onNavigate }) {
  const [view, setView] = useState('bookings');
  const [myBookings, setMyBookings] = useState([]);
  const [loadingB, setLoadingB] = useState(true);
  const [cancellingId, setCancellingId] = useState(null);
  const [toast, setToast] = useState(null);
  const spent = myBookings.filter(b=>b.status==='confirmed').reduce((s,b)=>s+(Number(b.total)||0),0);

  const reload = () => {
    setLoadingB(true);
    dbGetUserBookings(user.id).then(data => { setMyBookings(data); setLoadingB(false); });
  };

  useEffect(() => { reload(); }, [user.id]);

  const handleCancel = async (b) => {
    if (!window.confirm('Sei sicuro di voler cancellare questa prenotazione?')) return;
    setCancellingId(b.id);
    try {
      await dbCancelBooking(b.id, b.trip_id || b.tripId, b.seats);
      setMyBookings(prev => prev.map(x => x.id===b.id ? {...x, status:'cancelled'} : x));
      setToast({msg:'Prenotazione cancellata.', type:'success'});
    } catch(e) {
      setToast({msg:'Errore nella cancellazione.', type:'error'});
    } finally {
      setCancellingId(null);
    }
  };

  const statusBadge = (s) => {
    if (s==='confirmed') return <span className="badge badge-green">✓ Confermata</span>;
    if (s==='cancelled') return <span className="badge" style={{background:'#fee2e2',color:'#b91c1c'}}>✗ Cancellata</span>;
    return <span className="badge">{s}</span>;
  };

  return (
    <div className="dashboard-layout">
      {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
      <div className="sidebar">
        <div style={{padding:'0 12px 20px'}}>
          <div className="avatar" style={{width:56,height:56,fontSize:18,marginBottom:10}}>{user.avatar}</div>
          <div style={{fontWeight:800,fontSize:15,color:'var(--ink)'}}>{user.name}</div>
          <div style={{fontSize:12,color:'var(--ink-faint)',marginTop:3,fontWeight:600}}>{user.email}</div>
        </div>
        <div className="divider" style={{margin:'0 12px 12px'}}></div>
        <div className="sidebar-label">Il Mio Spazio</div>
        {[
          {id:'bookings',icon:'🎫',label:'Prenotazioni'},
          {id:'profile',icon:'👤',label:'Profilo'},
        ].map(item=>(
          <div key={item.id} className={`sidebar-item ${view===item.id?'active':''}`} onClick={()=>setView(item.id)}>
            <div className="s-icon">{item.icon}</div> {item.label}
          </div>
        ))}
        <div className="sidebar-item" onClick={()=>onNavigate('trips')}>
          <div className="s-icon">🔍</div> Cerca Viaggi
        </div>
      </div>
      <div className="main-content">
        {view==='bookings' && (
          <>
            <div className="page-header">
              <div className="page-title">Le Mie <span className="accent">Prenotazioni</span></div>
            </div>
            <div className="stats-row">
              <div className="stat-card stat-coral"><div className="stat-card-num" style={{color:'var(--coral)'}}>{myBookings.filter(b=>b.status==='confirmed').length}</div><div className="stat-card-label">Prenotazioni Attive</div></div>
              <div className="stat-card stat-mint"><div className="stat-card-num" style={{color:'var(--mint-dim)'}}>€{spent.toFixed(2)}</div><div className="stat-card-label">Spesa Totale</div></div>
            </div>
            {loadingB ? (
              <div className="empty-state"><div style={{fontSize:32}}>⏳</div><div className="empty-title">Caricamento...</div></div>
            ) : myBookings.length===0 ? (
              <div className="empty-state">
                <span className="empty-icon">🎫</span>
                <div className="empty-title">Nessuna Prenotazione</div>
                <p className="empty-desc">Inizia a esplorare i viaggi disponibili!</p>
                <button className="btn btn-primary" style={{marginTop:16}} onClick={()=>onNavigate('trips')}>Cerca Viaggi 🗺️</button>
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:16}}>
                {myBookings.map(b => {
                  const t = b.trip;
                  const drv = t?.driver;
                  const isCancelled = b.status === 'cancelled';
                  return (
                    <div key={b.id} className="card" style={{opacity: isCancelled ? 0.6 : 1}}>
                      <div className="card-body">
                        {/* Header prenotazione */}
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                          <div>
                            <div style={{fontWeight:900,fontSize:18,color:'var(--ink)'}}>
                              {t ? `${t.from_city || t.from} → ${t.to_city || t.to}` : 'Viaggio'}
                            </div>
                            <div style={{fontSize:12,color:'var(--ink-faint)',marginTop:2,fontFamily:'DM Mono'}}>
                              Prenotazione #{b.id.slice(0,8).toUpperCase()}
                            </div>
                          </div>
                          {statusBadge(b.status)}
                        </div>

                        {/* Dettagli viaggio */}
                        {t && (
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,padding:'12px',background:'var(--sky)',borderRadius:10,marginBottom:12}}>
                            <div>
                              <div style={{fontSize:11,color:'var(--ink-faint)',fontWeight:700,marginBottom:2}}>📅 DATA PARTENZA</div>
                              <div style={{fontWeight:700,fontSize:14}}>{fmtDate(t.departure)} alle {fmtTime(t.departure)}</div>
                            </div>
                            <div>
                              <div style={{fontSize:11,color:'var(--ink-faint)',fontWeight:700,marginBottom:2}}>🎫 POSTI PRENOTATI</div>
                              <div style={{fontWeight:700,fontSize:14}}>{b.seats} posto/i · <span style={{color:'var(--coral)'}}>€{Number(b.total).toFixed(2)}</span></div>
                            </div>
                            {t.meeting_point && (
                              <div style={{gridColumn:'1/-1'}}>
                                <div style={{fontSize:11,color:'var(--ink-faint)',fontWeight:700,marginBottom:2}}>📍 PUNTO DI INCONTRO</div>
                                <div style={{fontWeight:700,fontSize:14,color:'var(--ocean)'}}>{t.meeting_point}</div>
                              </div>
                            )}
                            {t.notes && (
                              <div style={{gridColumn:'1/-1'}}>
                                <div style={{fontSize:11,color:'var(--ink-faint)',fontWeight:700,marginBottom:2}}>📝 NOTE</div>
                                <div style={{fontSize:13}}>{t.notes}</div>
                              </div>
                            )}
                          </div>
                        )}

                        {/* Contatti autista */}
                        {drv && (
                          <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',background:'#f0fff8',borderRadius:10,marginBottom:12,border:'1.5px solid #c8f5e0'}}>
                            <DriverPhoto driver={drv} size={44}/>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:800,fontSize:14,color:'var(--ink)'}}>{drv.name}</div>
                              <div style={{fontSize:12,color:'var(--ink-soft)'}}>🚛 {drv.truck} · {drv.plate}</div>
                            </div>
                            {drv.phone ? (
                              <a href={`tel:${drv.phone}`} className="btn btn-primary btn-sm">
                                📞 Chiama
                              </a>
                            ) : (
                              <div style={{fontSize:12,color:'var(--ink-faint)',fontStyle:'italic'}}>Numero non disponibile</div>
                            )}
                          </div>
                        )}

                        {/* Azioni */}
                        {!isCancelled && (
                          <div style={{display:'flex',justifyContent:'flex-end'}}>
                            <button
                              className="btn btn-ghost btn-sm"
                              style={{color:'#ef4444',borderColor:'#fecaca'}}
                              onClick={()=>handleCancel(b)}
                              disabled={cancellingId===b.id}
                            >
                              {cancellingId===b.id ? '...' : '✗ Cancella Prenotazione'}
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </>
        )}
        {view==='profile' && (
          <>
            <div className="page-header"><div className="page-title">Il Mio <span className="accent">Profilo</span></div></div>
            <div style={{maxWidth:480}}>
              <div className="card"><div className="card-body">
                <div className="input-row">
                  <div className="form-group"><label className="form-label">Nome</label><input className="form-input" defaultValue={user.name.split(' ')[0]}/></div>
                  <div className="form-group"><label className="form-label">Cognome</label><input className="form-input" defaultValue={user.name.split(' ')[1]||''}/></div>
                </div>
                <div className="form-group"><label className="form-label">Email</label><input className="form-input" defaultValue={user.email}/></div>
                <div className="form-group"><label className="form-label">Telefono</label><input className="form-input" placeholder="+39 333 123 4567"/></div>
                <button className="btn btn-primary">Salva Modifiche ✓</button>
              </div></div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── DRIVER DASHBOARD ─────────────────────────────────────────────────────────

function DriverDashboard({ driver }) {
  const [view, setView] = useState('overview');
  const [showNew, setShowNew] = useState(false);
  const [showEditPrefs, setShowEditPrefs] = useState(false);
  const [toast, setToast] = useState(null);
  const company = driver.company || { name: driver.company_name || 'Azienda' };
  const [myTrips, setMyTrips] = useState([]);
  const [myBookings, setMyBookings] = useState([]);
  const [loadingTrips, setLoadingTrips] = useState(true);
  const earnings = myBookings.reduce((s,b)=>s+(Number(b.total)||0),0);

  useEffect(() => {
    dbGetDriverTrips(driver.id).then(data => { setMyTrips(data); setLoadingTrips(false); });
  }, [driver.id]);

  const [nt, setNt] = useState({ from:'', to:'', date:'', time:'09:00', seats:4, price:30, notes:'' });
  const upNt = k => e => setNt(f=>({...f,[k]:e.target.value}));

  // Editable prefs
  const [driverPrefs, setDriverPrefs] = useState({...(driver.prefs || {})});
  const togglePref = k => setDriverPrefs(p=>({...p,[k]:!p[k]}));

  // Photo management
  const [currentPhoto, setCurrentPhoto] = useState(getDriverPhoto(driver));

  const handlePhotoChange = (dataUrl) => {
    driver.photoUrl = dataUrl; // persist on object
    setCurrentPhoto(dataUrl || getDriverPhoto(driver));
    setToast({msg:'Foto profilo aggiornata! 📷',type:'success'});
  };

  const createTrip = async () => {
    if (!nt.from||!nt.to||!nt.date) { setToast({msg:'Compila partenza, destinazione e data.',type:'error'}); return; }
    try {
      const newTrip = await dbCreateTrip(driver.id, nt);
      const normalized = { ...newTrip, from: newTrip.from_city, to: newTrip.to_city, seatsLeft: newTrip.seats_left, driverId: newTrip.driver_id };
      setMyTrips(prev => [normalized, ...prev]);
      setShowNew(false);
      setNt({ from:'', to:'', date:'', time:'09:00', seats:4, price:30, notes:'' });
      setToast({msg:'Viaggio pubblicato con successo! 🎉',type:'success'});
    } catch(e) {
      setToast({msg: e.message || 'Errore pubblicazione viaggio', type:'error'});
    }
  };

  const savePrefs = () => {
    Object.assign(driver.prefs, driverPrefs);
    setShowEditPrefs(false);
    setToast({msg:'Preferenze aggiornate! ✓',type:'success'});
  };

  return (
    <div className="dashboard-layout">
      {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
      <div className="sidebar">
        <div style={{padding:'0 12px 20px',textAlign:'center'}}>
          {/* Driver photo in sidebar */}
          <div style={{position:'relative',display:'inline-block',marginBottom:10}}>
            <DriverPhoto driver={{...driver, photoUrl: driver.photoUrl}} size={72}/>
            <button
              onClick={()=>setView('foto')}
              title="Cambia foto"
              style={{
                position:'absolute',bottom:0,right:0,
                width:24,height:24,borderRadius:'50%',
                background:'var(--ocean)',color:'white',
                border:'2px solid white',fontSize:12,
                cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:'0 2px 8px rgba(0,0,0,0.2)'
              }}
            >✏️</button>
          </div>
          <div style={{fontWeight:800,fontSize:15,color:'var(--ink)'}}>{driver.name}</div>
          <div style={{fontSize:12,color:'var(--ink-faint)',marginTop:2,fontWeight:600}}>{driver.truck}</div>
          <div className="company-badge" style={{marginTop:8}}>🏢 {company?.name}</div>
        </div>
        <div className="divider" style={{margin:'0 12px 12px'}}></div>
        <div className="sidebar-label">Dashboard</div>
        {[

            <div className="s-icon">{item.icon}</div>{item.label}

// ─── VERIFICATION VIEW ────────────────────────────────────────────────────────
function VerificationView({ driver, onToast }) {
  const [file, setFile] = React.useState(null);
  const [preview, setPreview] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [status, setStatus] = React.useState(driver.verification_status || 'none');

  const handleFile = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const allowed = ['image/jpeg','image/png','application/pdf'];
    if (!allowed.includes(f.type)) { onToast({msg:'Formato non valido. Usa JPG, PNG o PDF.', type:'error'}); return; }
    if (f.size > 5 * 1024 * 1024) { onToast({msg:'File troppo grande. Max 5MB.', type:'error'}); return; }
    setFile(f);
    if (f.type !== 'application/pdf') {
      const reader = new FileReader();
      reader.onload = e => setPreview(e.target.result);
      reader.readAsDataURL(f);
    } else { setPreview('pdf'); }
  };

  const handleSubmit = async () => {
    if (!file) { onToast({msg:'Seleziona un documento prima.', type:'error'}); return; }
    setLoading(true);
    try {
      const url = await dbUploadDocument(driver.id, file);
      await dbRequestVerification(driver.id, url);
      setStatus('pending');
      onToast({msg:'Documento inviato! Verifica in corso entro 24h', type:'success'});
    } catch(e) {
      onToast({msg: e.message || 'Errore nel caricamento.', type:'error'});
    } finally { setLoading(false); }
  };

  const statusInfo = {
    none:     { icon:'🛡️', color:'#718096', bg:'#f7fafc', title:'Non Verificato',     desc:'Carica un documento per ottenere il badge verificato.' },
    pending:  { icon:'⏳', color:'#b07a00', bg:'#fffbeb', title:'In Attesa',           desc:'Documento ricevuto. Verifica entro 24h.' },
    verified: { icon:'✅', color:'#2aad74', bg:'#f0fff8', title:'Identità Verificata', desc:'Il tuo profilo mostra il badge verificato.' },
    rejected: { icon:'❌', color:'#e05a3a', bg:'#fff5f5', title:'Documento Rifiutato', desc:'Carica un nuovo documento leggibile.' },
  };
  const si = statusInfo[status] || statusInfo.none;

  return (
    <>
      <div className="page-header">
        <div className="page-title">Verifica <span className="accent">Identità</span></div>
        <div className="page-sub">Il badge verificato aumenta le prenotazioni</div>
      </div>
      <div style={{background:si.bg,border:`2px solid ${si.color}30`,borderRadius:16,padding:24,marginBottom:24,display:'flex',alignItems:'center',gap:16}}>
        <div style={{fontSize:40}}>{si.icon}</div>
        <div>
          <div style={{fontWeight:900,fontSize:18,color:si.color}}>{si.title}</div>
          <div style={{fontSize:14,color:'#4a5568',marginTop:4}}>{si.desc}</div>
        </div>
      </div>
      {(status === 'none' || status === 'rejected') && (
        <div className="card">
          <div className="card-body">
            <div style={{fontWeight:800,fontSize:16,marginBottom:16}}>📎 Carica Documento di Identità</div>
            <div style={{fontSize:13,color:'#718096',marginBottom:20,lineHeight:1.6}}>
              Patente di guida · Carta d'identità · Passaporto<br/>
              Formati: JPG, PNG, PDF — Max 5MB
            </div>
            <label style={{display:'block',border:'2px dashed var(--ocean)',borderRadius:12,padding:32,textAlign:'center',cursor:'pointer',background:'var(--sky)',marginBottom:16}}>
              <input type="file" accept=".jpg,.jpeg,.png,.pdf" onChange={handleFile} style={{display:'none'}}/>
              {preview ? (
                preview === 'pdf'
                  ? <div style={{fontSize:48}}>📄<div style={{fontSize:14,marginTop:8,color:'var(--ocean)',fontWeight:700}}>PDF caricato ✓</div></div>
                  : <img src={preview} style={{maxHeight:200,borderRadius:8,maxWidth:'100%'}} alt="preview"/>
              ) : (
                <>
                  <div style={{fontSize:40,marginBottom:8}}>📷</div>
                  <div style={{fontWeight:700,color:'var(--ocean)'}}>Clicca per selezionare il file</div>
                  <div style={{fontSize:12,color:'#718096',marginTop:4}}>oppure trascina qui il documento</div>
                </>
              )}
            </label>
            {file && <div style={{fontSize:13,color:'var(--ink-soft)',marginBottom:16}}>File: <strong>{file.name}</strong> ({(file.size/1024/1024).toFixed(2)} MB)</div>}
            <button className="btn btn-primary btn-lg" onClick={handleSubmit} disabled={loading || !file}>
              {loading ? '⏳ Caricamento...' : '🛡️ Invia per Verifica'}
            </button>
          </div>
        </div>
      )}
      {status === 'verified' && (
        <div style={{background:'linear-gradient(135deg,#0d2340,#1a7fbf)',borderRadius:16,padding:24,color:'white',textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:8}}>✅</div>
          <div style={{fontWeight:900,fontSize:20,marginBottom:8}}>Sei un Autista Verificato!</div>
          <div style={{opacity:0.8,fontSize:14}}>Il badge appare sul tuo profilo.</div>
        </div>
      )}
    </>
  );
}

// ─── ADMIN PANEL ──────────────────────────────────────────────────────────────
const ADMIN_EMAIL = 'benozziluca09@gmail.com';

function AdminPanel({ user }) {
  const [verifications, setVerifications] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [toast, setToast] = React.useState(null);

  const load = async () => {
    setLoading(true);
    const data = await dbGetPendingVerifications();
    setVerifications(data);
    setLoading(false);
  };

  React.useEffect(() => { load(); }, []);

  const handleReview = async (driverId, approved) => {
    try {
      await dbReviewVerification(driverId, approved);
      setVerifications(prev => prev.filter(v => v.driver_id !== driverId));
      setToast({msg: approved ? '✅ Autista verificato!' : '❌ Verifica rifiutata', type: approved ? 'success' : 'error'});
    } catch(e) {
      setToast({msg: 'Errore: ' + e.message, type:'error'});
    }
  };

  return (
    <div style={{maxWidth:900,margin:'80px auto',padding:'0 24px'}}>
      {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
      <div style={{background:'linear-gradient(135deg,#0d2340,#1a7fbf)',borderRadius:16,padding:32,marginBottom:32,color:'white'}}>
        <div style={{fontSize:32,marginBottom:8}}>🛡️ Pannello Admin</div>
        <div style={{opacity:0.8}}>Gestisci le verifiche identità degli autisti</div>
      </div>
      {loading ? (
        <div style={{textAlign:'center',padding:40}}>⏳ Caricamento...</div>
      ) : verifications.length === 0 ? (
        <div style={{textAlign:'center',padding:60,background:'white',borderRadius:16,boxShadow:'0 2px 20px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:48,marginBottom:16}}>✅</div>
          <div style={{fontWeight:800,fontSize:20}}>Nessuna verifica in attesa</div>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {verifications.map(v => {
            const drv = v.driver || {};
            return (
              <div key={v.id} className="card">
                <div className="card-body">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <DriverPhoto driver={drv} size={52}/>
                      <div>
                        <div style={{fontWeight:900,fontSize:17}}>{drv.name}</div>
                        <div style={{fontSize:13,color:'#718096'}}>{drv.email} · {drv.phone || 'Nessun telefono'}</div>
                        <div style={{fontSize:12,color:'#718096'}}>🚛 {drv.truck} · {drv.plate}</div>
                      </div>
                    </div>
                    <div style={{fontSize:12,color:'#718096'}}>{new Date(v.created_at).toLocaleDateString('it-IT')}</div>
                  </div>
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:12,fontWeight:800,color:'#718096',marginBottom:8}}>DOCUMENTO CARICATO</div>
                    {v.document_url && v.document_url.includes('http') ? (
                      v.document_url.toLowerCase().includes('.pdf') ? (
                        <a href={v.document_url} target="_blank" rel="noreferrer"
                          style={{display:'inline-flex',alignItems:'center',gap:8,background:'#f7fafc',border:'1px solid #e2e8f0',borderRadius:8,padding:'8px 16px',textDecoration:'none',color:'var(--ocean)',fontWeight:700}}>
                          📄 Apri PDF documento
                        </a>
                      ) : (
                        <img src={v.document_url} alt="documento"
                          style={{maxWidth:'100%',maxHeight:300,borderRadius:12,border:'1px solid #e2e8f0',cursor:'pointer'}}
                          onClick={()=>window.open(v.document_url,'_blank')}/>
                      )
                    ) : (
                      <div style={{color:'#718096',fontSize:13}}>⚠️ URL documento scaduto — richiedi nuovo upload</div>
                    )}
                  </div>
                  <div style={{display:'flex',gap:12}}>
                    <button className="btn btn-primary" onClick={()=>handleReview(v.driver_id, true)}
                      style={{background:'linear-gradient(135deg,#2aad74,#22c55e)'}}>
                      ✅ Approva
                    </button>
                    <button className="btn btn-ghost" onClick={()=>handleReview(v.driver_id, false)}
                      style={{color:'#e05a3a',borderColor:'#fecaca'}}>
                      ❌ Rifiuta
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState('home');
  const [user, setUser] = useState(null);
  const [driver, setDriver] = useState(null);
  const [authModal, setAuthModal] = useState(null);
  const [toast, setToast] = useState(null);
  const [sessionLoading, setSessionLoading] = useState(true);

  // Ripristina sessione al ricaricamento pagina
  useEffect(() => {
    const restoreSession = async () => {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          // Prova prima come autista
          const { data: drv } = await supabase
            .from('drivers')
            .select('*, company:companies(*)')
            .eq('auth_id', session.user.id)
            .maybeSingle();
          if (drv) {
            const d = { ...drv, companyId: drv.company_id, photoUrl: drv.photo_url, verified: drv.verified, verification_status: drv.verification_status,
              avatar: drv.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) };
            setDriver(d); setPage('driver-dash');
          } else {
            // Altrimenti è un passeggero
            const { data: profile } = await supabase
              .from('users').select('*').eq('id', session.user.id).single();
            if (profile) {
              const u = { id: session.user.id, name: profile.name, email: session.user.email,
                avatar: profile.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) };
              setUser(u); setPage('user-dash');
            }
          }
        }
      } catch(e) {
        console.error('Errore ripristino sessione:', e);
      } finally {
        setSessionLoading(false);
      }
    };
    restoreSession();

    // Ascolta cambiamenti sessione (login/logout)
    const { data: { subscription } } = supabase.auth.onAuthStateChange(() => {});
    return () => subscription.unsubscribe();
  }, []);

  const handleLogin = (u, d) => {
    setUser(u); setDriver(d);
    setToast({ msg:`Benvenuto${d?' autista':''}, ${(u||d).name.split(' ')[0]}! 🎉`, type:'success' });
    if (d) setPage('driver-dash');
    else if (u) setPage('user-dash');
  };

  const handleLogout = async () => {
    await supabase.auth.signOut();
    setUser(null); setDriver(null); setPage('home');
    setToast({ msg:'Arrivederci! A presto 👋', type:'success' });
  };

  // Mostra schermata di caricamento mentre ripristina la sessione
  if (sessionLoading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16}}>
      <div style={{fontSize:48}}>🚛</div>
      <div style={{fontFamily:'Righteous',fontSize:24,color:'var(--ocean)'}}>Pick Up!</div>
      <div style={{color:'var(--ink-soft)',fontSize:14}}>Caricamento...</div>
    </div>
  );

  return (
    <div>
      {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
      <Nav user={user} driver={driver} onLoginOpen={m=>setAuthModal(m)} onLogout={handleLogout} onNavigate={setPage} currentPage={page}/>
      {page==='home' && <HomePage onNavigate={setPage} onLoginOpen={m=>setAuthModal(m)}/>}
      {page==='trips' && <TripsPage user={user} onLoginOpen={m=>setAuthModal(m)}/>}
      {page==='user-dash' && user && <UserDashboard user={user} onNavigate={setPage}/>}
      {page==='driver-dash' && driver && <DriverDashboard driver={driver}/>}
      {page==='user-dash' && !user && (
        <div style={{paddingTop:120,textAlign:'center'}}>
          <div style={{fontSize:64,marginBottom:16}}>🔒</div>
          <div style={{fontFamily:'Righteous',fontSize:36,marginBottom:16,color:'var(--ink)'}}>Accesso Richiesto</div>
          <button className="btn btn-primary btn-lg" onClick={()=>setAuthModal('login')}>Accedi →</button>
        </div>
      )}
      {authModal && <AuthModal mode={authModal} onClose={()=>setAuthModal(null)} onLogin={handleLogin}/>}
      {page==='admin' && user?.email===ADMIN_EMAIL && <AdminPanel user={user}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
